<style>
  :root{--bg:#F1E9D7;--ink:#2A2520;--soft:#646052;--accent:#51247A}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .card{max-width:460px}
  .mark{width:84px;height:84px;object-fit:contain;margin:0 auto 18px;display:block}
  .brand{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:30px;letter-spacing:.02em;margin:0}
  .brand .dot{color:var(--accent)}
  .sub{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--soft);margin:8px 0 26px}
  .opening{display:inline-flex;align-items:center;gap:10px;color:var(--soft);font-size:14px}
  .spin{width:14px;height:14px;border:2px solid rgba(81,36,122,.25);border-top-color:var(--accent);
    border-radius:50%;animation:s .8s linear infinite;display:inline-block}
  @keyframes s{to{transform:rotate(360deg)}}
  .manual{margin-top:26px;font-size:13px;color:var(--soft)}
  .manual a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(81,36,122,.3)}
  @media (prefers-reduced-motion:reduce){.spin{animation:none}}
</style>
